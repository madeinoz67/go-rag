name: Release

# Tag-triggered release pipeline (researched 2026-06-26). Pure-Go CGO_ENABLED=0
# cross-compile → per-OS/arch archives → SHA-256 checksums → GitHub Release with
# generated notes. Also attaches the bundled embedding model (spec 032) so
# `go-rag init` can fetch it same-origin from the release assets (D1a) instead of
# HuggingFace. Nothing runs until a v* tag is pushed.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p out
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME} -X github.com/madeinoz67/go-rag/internal/embed/modelbundle.binaryVersion=${GITHUB_REF_NAME}" \
            -o "out/go-rag${ext}" ./cmd/go-rag
      - name: Verify linux/amd64 binary responds
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: ./out/go-rag version
      - name: Archive
        run: |
          v="${GITHUB_REF_NAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd out && zip -r "../go-rag-${v}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" .)
          else
            tar -czf "go-rag-${v}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" -C out .
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-rag-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go-rag-*-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Bundle the default embedding model (spec 032, D1a)
        run: |
          set -e
          repo="Xenova/bge-small-en-v1.5"
          base="https://huggingface.co/${repo}/resolve/main"
          mkdir -p "model/${repo//\//_}"
          curl -fL "$base/onnx/model_int8.onnx" -o "model/${repo//\//_}/model_int8.onnx"
          for f in tokenizer.json config.json tokenizer_config.json special_tokens_map.json vocab.txt; do
            curl -fL "$base/$f" -o "model/${repo//\//_}/$f"
          done
          tar -czf dist/go-rag-model-bge-small-en-v1.5-int8.tar.gz -C model .
      - name: Generate checksums
        run: |
          cd dist
          sha256sum go-rag-* > checksums.txt
          echo "--- checksums ---"
          cat checksums.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/go-rag-* dist/checksums.txt


  tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # for the formula template at .github/homebrew/go-rag.rb.tmpl
      - name: Download all build artifacts (for the 4 brew-platform SHA-256s)
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Render Formula/go-rag.rb from the template and push to madeinoz67/homebrew-tap
        continue-on-error: true   # don't fail the release if the tap token isn't set yet
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -e
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set; skipping Homebrew tap bump. Add a PAT (contents:write on madeinoz67/homebrew-tap) as the HOMEBREW_TAP_TOKEN repo secret to enable."
            exit 0
          fi
          ver="${VERSION#v}"
          sha_amd64_mac=$(sha256sum "dist/go-rag-${VERSION}-darwin-amd64.tar.gz" | awk '{print $1}')
          sha_arm64_mac=$(sha256sum "dist/go-rag-${VERSION}-darwin-arm64.tar.gz" | awk '{print $1}')
          sha_amd64_linux=$(sha256sum "dist/go-rag-${VERSION}-linux-amd64.tar.gz" | awk '{print $1}')
          sha_arm64_linux=$(sha256sum "dist/go-rag-${VERSION}-linux-arm64.tar.gz" | awk '{print $1}')
          sed -e "s/__VER__/${ver}/" \
              -e "s/__SHA_AMD64_MAC__/${sha_amd64_mac}/" \
              -e "s/__SHA_ARM64_MAC__/${sha_arm64_mac}/" \
              -e "s/__SHA_AMD64_LINUX__/${sha_amd64_linux}/" \
              -e "s/__SHA_ARM64_LINUX__/${sha_arm64_linux}/" \
              .github/homebrew/go-rag.rb.tmpl > /tmp/go-rag.rb
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/madeinoz67/homebrew-tap" tap
          mkdir -p tap/Formula
          mv /tmp/go-rag.rb tap/Formula/go-rag.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "go-rag ${VERSION}" || echo "no formula changes"
          git push

  # spec 033: publish a multi-arch (linux/amd64 + linux/arm64) container image to
  # GHCR on every tag. `needs: build` (NOT release) so the image is not gated on
  # model-bundling/Homebrew — it publishes as soon as the binary build passes.
  # go-rag is CGO-free + distroless static, so QEMU user-mode emulates arm64 with
  # NO C toolchain pulled. Implicit GITHUB_TOKEN (packages: write) — no PAT.
  docker-image:
    name: publish multi-arch image to GHCR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read       # job-level perms REPLACE workflow-level — re-declare
      packages: write      # required for GITHUB_TOKEN to push to ghcr.io
      id-token: write      # reserved for future OIDC keyless signing (cosign)
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io/madeinoz67/go-rag is already lowercase (GHCR rejects mixed-case).
      # type=semver strips the leading v (v0.4.2 -> 0.4.2, 0.4); the hyphen guard
      # suppresses `latest` on pre-release tags (v0.4.2-rc.1).
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/madeinoz67/go-rag
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name,'-') }}
          labels: |
            org.opencontainers.image.title=go-rag
            org.opencontainers.image.description=Single-binary, local-first, pure-Go RAG database
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Print published image digest
        run: echo "Published ${{ steps.meta.outputs.tags }} @ ${{ steps.build.outputs.digest }}"
