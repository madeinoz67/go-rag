name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (lint, vet, test, vuln)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -cover ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned: go.mod targets a recent Go, and golangci-lint must be built
          # with a Go >= the `go` directive or it refuses to load config
          # ("Go language version used to build golangci-lint is lower than the
          # targeted Go version"). v2.12.2 is built with go1.26.2 and lints
          # go1.26.4 cleanly. Bump alongside go.mod's `go` directive.
          version: v2.12.2

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  eval:
    # Retrieval-quality regression gate (audit item H02). Runs the offline,
    # reproducible eval harness against the committed golden set + baseline and
    # fails when recall@10 regresses beyond tolerance. Scoped to changes on the
    # retrieval-quality surface so unrelated PRs don't trip it.
    name: eval (retrieval-quality gate)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      !github.event.pull_request.draft
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Retrieval-quality gate
        run: make test-eval

  build:
    name: build (static binary)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_SHA::7}" \
            -o go-rag ./cmd/go-rag

      - name: Verify binary responds
        run: ./go-rag version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-rag-${{ github.sha }}
          path: go-rag
          if-no-files-found: error
