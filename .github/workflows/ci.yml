name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (lint, vet, test, vuln)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -cover ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # @v7 is required for golangci-lint v2: @v6 is v1-only (which is why
          # `version: latest` previously resolved to the ancient v1.64.8, built
          # with go1.24 — it can't load config for the 1.26.4 target). v2.12.2
          # is built with go1.26.2 and lints go1.26.4 cleanly. Bump this pin
          # alongside go.mod's `go` directive.
          version: v2.12.2

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  eval:
    # Retrieval-quality regression gate (audit item H02). Runs the offline,
    # reproducible eval harness against the committed golden set + baseline and
    # fails when recall@10 regresses beyond tolerance. Scoped to changes on the
    # retrieval-quality surface so unrelated PRs don't trip it.
    name: eval (retrieval-quality gate)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      !github.event.pull_request.draft
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Retrieval-quality gate
        run: make test-eval

  build:
    name: build (static binary)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_SHA::7}" \
            -o go-rag ./cmd/go-rag

      - name: Verify binary responds
        run: ./go-rag version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-rag-${{ github.sha }}
          path: go-rag
          if-no-files-found: error

  # spec 033: smoke-gate the Dockerfile on every push/PR so a broken image is
  # caught before the tag-triggered multi-arch release job. Builds linux/amd64
  # into the runner's local daemon only — NEVER pushes (no tags, push:false, no
  # packages:write). Buildx (not plain `docker build`) so the smoke path matches
  # the release builder. provenance:false is MANDATORY: provenance attestations
  # require a registry push, and push:false fails the build otherwise.
  docker-smoke:
    name: docker-smoke (amd64 image build)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load only, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          sbom: false
          tags: go-rag:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify binary runs in container
        run: docker run --rm go-rag:smoke version
