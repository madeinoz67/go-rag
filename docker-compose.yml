# docker-compose.yml — go-rag local RAG database (spec 033)
#
# One foreground daemon, one Pebble vault. Bring up with:
#   docker compose up -d                      # bundled embedder, zero external deps
#   docker compose --profile ollama up -d      # opt-in Ollama sidecar (escape hatch)
#
# FIRST-RUN: the go-rag-init sidecar runs `go-rag init` once on the empty vault
# volume (creating config.json + the Pebble dir and fetching the bundled model)
# before the daemon starts. `serve` will not boot on an uninitialized vault.
#
# SINGLE-WRITER RULE (PRD §6.7 / spec 007): exactly ONE go-rag process may own the
# vault at a time. NEVER set deploy.replicas > 1, and NEVER run a second writer
# container against the same `go-rag-data` volume. Restart/crash recovery is fine
# (the PID lock is released when the old process dies); concurrent live writers
# corrupt the store.
#
# Local-first (Principle I): the default profile has NO cloud or runtime
# dependency beyond the host. The bundled pure-Go embedder (spec 032) needs no
# external service; Ollama is an opt-in escape hatch.

services:
  # ── one-shot: initialize the vault + fetch the bundled model ──────────────
  # A fresh named volume has no config.json, and `serve` refuses to boot without
  # one. This runs `go-rag init` once (idempotent) before the daemon starts.
  # HOME=/data co-locates the bundled model (default ~/.go-rag/models) inside the
  # vault volume so it survives container recreation (no re-fetch per boot).
  # To use the published image instead of a local build, set `image:` on BOTH
  # this service and `go-rag` and comment out both `build:` lines.
  go-rag-init:
    build: .
    # image: ghcr.io/madeinoz67/go-rag:latest
    container_name: go-rag-init
    environment:
      HOME: /data
    command: ["init"]
    volumes:
      - go-rag-data:/data
    restart: "no"   # one-shot; exits 0 when the vault is ready

  go-rag:
    build: .
    # image: ghcr.io/madeinoz67/go-rag:latest
    container_name: go-rag
    depends_on:
      go-rag-init:
        condition: service_completed_successfully   # wait for init before booting
    environment:
      HOME: /data   # keep the bundled model under the vault volume (matches init)
      # GO_RAG_* env-var config overrides layer over <dbPath>/config.json
      # (spec 033). Env wins only when set + non-empty; file is otherwise base.
      # NOTE: ingestion is API-driven (POST /v1/add above). The daemon does NOT
      # auto-watch a directory today, so GO_RAG_WATCH_DIRS does not trigger ingest
      # in `serve`; re-POST /v1/add (or POST /v1/scan) to pick up new files.
      # Opt-in Ollama (meaningful only under the `ollama` profile). Setting this
      # alone does NOT switch the embedder — also set GO_RAG_EMBEDDING_MODEL.
      GO_RAG_OLLAMA_URL: http://ollama:11434
      #   GO_RAG_EMBEDDING_MODEL: nomic-embed-text
    restart: unless-stopped

    # `serve` = FOREGROUND daemon (PID 1, owns SIGTERM/SIGINT graceful shutdown).
    # NEVER use `start` here — it detaches and forks a child, wrong for PID 1.
    # Loopback-by-default contract (spec 007): the daemon refuses non-loopback
    # binds unless --bind-external is passed, so the container MUST pass 0.0.0.0
    # addrs AND --bind-external. Host-side exposure is governed by `ports:` below
    # (loopback by default).
    command:
      - serve
      - --mcp-addr
      - 0.0.0.0:7878
      - --rest-addr
      - 0.0.0.0:7879
      - --grpc-addr
      - 0.0.0.0:7880
      - --bind-external

    # Host LOOPBACK by default — the daemon is reachable only from this machine.
    # To expose on the LAN, replace 127.0.0.1 with 0.0.0.0 (or a NIC IP) on each
    # line. There is NO TLS; only do this on a trusted network (spec 007 warning).
    ports:
      - "127.0.0.1:7878:7878"   # MCP  (HTTP/JSON-RPC, always-on)
      - "127.0.0.1:7879:7879"   # REST (stdlib net/http)
      - "127.0.0.1:7880:7880"   # gRPC (grpc-go)
    # LAN-exposure variant (uncomment to publish on all interfaces, no TLS):
    #   - "7878:7878"
    #   - "7879:7879"
    #   - "7880:7880"

    volumes:
      # The Pebble vault — single-writer. Named volume so it survives down/up.
      # config.json + the data/ dir + the bundled model (via HOME=/data) persist here.
      - go-rag-data:/data
      # Ingestion surface: read-only bind mount of host docs into the container.
      # The daemon ingests via its REST API (single-writer-safe — do NOT exec a
      # second `go-rag add`; the running daemon holds the Pebble lock):
      #   curl -X POST http://127.0.0.1:7879/v1/add  -H 'Content-Type: application/json' -d '{"path":"/ingest"}'
      #   curl -X POST http://127.0.0.1:7879/v1/query -H 'Content-Type: application/json' -d '{"query":"term","k":5}'
      # REST routes are bearer-guarded, DISABLED when the token is empty (the
      # default on local loopback). Set GO_RAG_MCP_TOKEN to require auth.
      - ./docs:/ingest:ro

    # Exec-form healthcheck — invokes the binary directly. distroless/static has
    # NO shell and NO curl, so `go-rag health` (spec 033) is the only viable probe.
    # It pings 127.0.0.1:7878/mcp/health from INSIDE the container, always
    # reachable regardless of --bind-external or the host port mapping.
    healthcheck:
      test: ["CMD", "go-rag", "health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

    # Single-writer: never raise this above 1 and never add a second service
    # mounting go-rag-data read-write (go-rag-init mounts it but exits before
    # the daemon starts, so there is never a live concurrent writer).
    deploy:
      replicas: 1

  # ---- Optional Ollama sidecar (escape hatch, spec 032 / PRD §4.2.5) ------------
  # Off by default. Activate with:  docker compose --profile ollama up -d
  # Then pull a model (docker compose exec go-rag-ollama ollama pull nomic-embed-text)
  # and set GO_RAG_EMBEDDING_MODEL on go-rag to switch off the bundled embedder.
  ollama:
    image: ollama/ollama:0.9
    container_name: go-rag-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # GPU passthrough (uncomment on a host with nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  go-rag-data:    # the vault — single-writer; never mount RW into a second live container
  ollama-models:
